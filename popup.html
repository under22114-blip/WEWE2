<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Wealth Scanner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>⚡ Roblox Wealth Scanner</h1>
        </header>
        
        <main>
            <div class="input-box">
                <input 
                    id="url" 
                    type="text" 
                    placeholder="https://www.roblox.com/communities/12345/..."
                    autocomplete="off"
                >
                <button id="scan">SCAN</button>
            </div>
            
            <div id="status"></div>
            <div id="progress" class="hidden"></div>
            
            <div id="results"></div>
        </main>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
