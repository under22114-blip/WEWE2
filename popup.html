<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Wealth Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="title">
                <span class="icon">💎</span>
                <h1>Roblox Wealth Tracker</h1>
            </div>
            <div class="version">v2.0</div>
        </header>

        <!-- Input Section -->
        <section class="input-section">
            <div class="input-group">
                <label for="communityUrl">Community Link</label>
                <input 
                    type="url" 
                    id="communityUrl" 
                    placeholder="https://www.roblox.com/communities/35461612/..."
                    autocomplete="off"
                    spellcheck="false"
                >
                <div class="input-status" id="inputStatus"></div>
            </div>
            
            <div class="controls">
                <button id="scanBtn" class="btn primary" disabled>
                    <span class="btn-text">Scan Community</span>
                    <span class="btn-icon">🔍</span>
                </button>
                <button id="refreshBtn" class="btn secondary" disabled>
                    <span class="btn-text">Refresh</span>
                    <span class="btn-icon">🔄</span>
                </button>
            </div>
        </section>

        <!-- Status Section -->
        <section class="status-section">
            <div id="statusDisplay" class="status-display"></div>
            <div id="progressContainer" class="progress-container hidden">
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
                <div id="progressText" class="progress-text">0%</div>
            </div>
        </section>

        <!-- Results Section -->
        <section class="results-section">
            <div id="statsBar" class="stats-bar hidden">
                <div class="stat">
                    <span class="stat-label">Members</span>
                    <span id="memberCount" class="stat-value">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">With RAP</span>
                    <span id="rapCount" class="stat-value">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Total Value</span>
                    <span id="totalValue" class="stat-value">R$ 0</span>
                </div>
            </div>

            <div id="leaderboard" class="leaderboard"></div>
        </section>
    </div>

    <script src="main.js"></script>
</body>
</html>
