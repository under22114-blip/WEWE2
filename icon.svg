<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#gradient)" stroke="#ffffff" stroke-width="4"/>
  
  <!-- Roblox-style head -->
  <rect x="44" y="35" width="40" height="40" rx="8" fill="#ffffff"/>
  
  <!-- Eyes -->
  <circle cx="54" cy="50" r="4" fill="#000000"/>
  <circle cx="74" cy="50" r="4" fill="#000000"/>
  
  <!-- Mouth -->
  <rect x="58" y="62" width="12" height="4" rx="2" fill="#000000"/>
  
  <!-- Crown/wealth symbol -->
  <path d="M48 25 L52 35 L60 30 L68 35 L72 30 L76 35 L80 25 L48 25 Z" fill="#ffd700" stroke="#ffaa00" stroke-width="1"/>
  
  <!-- Dollar signs -->
  <text x="25" y="95" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#00d4ff">$</text>
  <text x="95" y="95" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#00d4ff">$</text>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>